<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Srdce v běhu | Heart in Motion</title>
    
    <!-- Link to our CSS Materials -->
    <link rel="stylesheet" href="style.css">
    
    <!-- Importing a classic, vintage serif font for that old-world feel -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
</head>
<body>
    <!-- BACKGROUND LAYER: WebGL Canvas and Vintage Grain -->
    <div id="canvas-container"></div>
    <div class="vintage-film-grain"></div>

    <!-- UI LAYER: Everything the user interacts with -->
    <div class="ui-layer">
        
        <!-- Navigation bar -->
        <header class="antique-glass-nav">
            <div class="logo">
                <h2 id="nav-title" data-en="Heart in Motion" data-cs="Srdce v běhu">Heart in Motion</h2>
            </div>
            
            <div class="controls">
                <button id="lang-toggle" class="vintage-btn">CS</button>
                <button id="play-btn" class="vintage-btn">▶</button>
            </div>
        </header>

        <!-- Main Content Area -->
        <main class="content-container">
            <!-- Central Hero Card mapping your specific mission -->
            <section class="hero-card antique-glass-card">
                <h1 id="hero-heading" data-en="Compassion. Support. Sanctuary." data-cs="Soucit. Podpora. Útočiště.">
                    Compassion. Support. Sanctuary.
                </h1>
                
                <hr class="vintage-divider">
                
                <p id="hero-desc" data-en="Bringing life and hope back to the psychologically vulnerable and those walking the hardest paths. A safe haven for everyone, no matter their journey." data-cs="Vracíme život a naději duševně nemocným a těm, kteří kráčí po nejtěžších životních cestách. Bezpečný přístav pro všechny, bez ohledu na jejich osud.">
                    Bringing life and hope back to the psychologically vulnerable and those walking the hardest paths. A safe haven for everyone, no matter their journey.
                </p>

                <!-- Action Button for Donations/Help based on the flyer -->
                <div style="margin-top: 2.5rem;">
                    <button class="vintage-btn" style="font-size: 1.1rem; padding: 0.8rem 2rem;" data-en="How to Help" data-cs="Jak pomoci">
                        How to Help
                    </button>
                </div>
            </section>
        </main>

        <!-- Bottom Left Logo Integration -->
        <div class="footer-logo" style="position: absolute; bottom: 2rem; left: 2rem; z-index: 50;">
            <!-- Make sure 1000013379.jpg is in the same folder as this HTML file -->
            <img src="1000013379.jpg" alt="Srdce v běhu Logo" style="width: 130px; height: auto; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.6); opacity: 0.85; transition: opacity 0.3s ease;" onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='0.85'">
        </div>

    </div>

    <!-- Hidden audio element - just add an audio file named ambient-track.mp3 to your folder -->
    <audio id="bg-audio" src="ambient-track.mp3" loop></audio>

    <!-- Link to our JavaScript Functions -->
    <script src="script.js"></script>
</body>
</html>
